<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services & Pricing | Kimana Auto Care</title>
  <meta name="description" content="Engine, brake, electrical, and mobile mechanic services in Kimana. Transparent starting prices, fair rates, and a collaborative network for complex jobs." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/components/header.css" />
  <link rel="stylesheet" href="../styles/components/service-card.css" />
  <link rel="stylesheet" href="../styles/components/cart.css" />
  <link rel="stylesheet" href="../styles/utilities/buttons.css" />
  <link rel="stylesheet" href="../styles/utilities/forms.css" />
  <link rel="stylesheet" href="../styles/utilities/responsive.css" />
</head>
<body data-page="services">
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div id="header-root"></div>

  <main id="main-content">
    <section class="section-alt" style="padding-top: var(--space-7);">
      <div class="container">
        <div class="section-heading">
          <span class="eyebrow">Services &amp; Pricing</span>
          <h2>Honest Pricing, No Surprises</h2>
          <p>Browse our services below. Standard jobs show a starting price — complex jobs get a personalized quote. Tap "Add to Cart" to build your request, then send it straight to WhatsApp.</p>
        </div>
        <div style="display:flex; flex-wrap:wrap; gap: var(--space-3); justify-content:center; margin-bottom: var(--space-6);">
          <span class="badge badge-mobile-service">📍 Mobile Service Available</span>
          <span class="badge" style="background: var(--color-gold-100); color: var(--color-gold-dark); border: 1px solid var(--color-gold);">🚨 24/7 Emergency Service</span>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div id="service-categories-root"></div>

        <div class="collaborative-banner" id="collaborative-root">
          <!-- Populated by app.js from services.json "collaborative" -->
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <div id="service-cart-root"></div>
  <div id="emergency-badge-root"></div>

  <script type="module" src="../src/app.js"></script>
</body>
</html>
